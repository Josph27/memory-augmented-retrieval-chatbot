{
  "cases": [
    {
      "id": "PB-PERSIST-001",
      "category": "persistence",
      "description": "Messages remain owned by their correct chat.",
      "initial_state": {"chats": ["A", "B"]},
      "actions": ["write:A", "write:B", "read:A", "read:B"],
      "expected_state": {"cross_chat_messages": 0},
      "required_events": ["scoped_message_reads"],
      "forbidden_events": ["cross_chat_message"],
      "deterministic": true,
      "execution_layer": "repository/service",
      "repetitions": 1,
      "oracle": "persistence_message_isolation",
      "tags": ["scope_isolation"]
    },
    {
      "id": "PB-PERSIST-002",
      "category": "persistence",
      "description": "Inactive status survives repository reconstruction.",
      "initial_state": {"chat": "ended"},
      "actions": ["mark_inactive", "reconstruct_database"],
      "expected_state": {"active": false},
      "required_events": ["persisted_status_read"],
      "forbidden_events": ["implicit_reactivation"],
      "deterministic": true,
      "execution_layer": "repository/service",
      "repetitions": 1,
      "oracle": "persistence_inactive_restart",
      "tags": ["persistence"]
    },
    {
      "id": "PB-PERSIST-003",
      "category": "persistence",
      "description": "Chat list survives repository reconstruction.",
      "initial_state": {"chats": 3},
      "actions": ["reconstruct_database", "list_chats"],
      "expected_state": {"chats": 3},
      "required_events": ["persisted_chat_read"],
      "forbidden_events": ["chat_loss"],
      "deterministic": true,
      "execution_layer": "repository/service",
      "repetitions": 1,
      "oracle": "persistence_chat_list_restart",
      "tags": ["persistence"]
    },
    {
      "id": "PB-PERSIST-004",
      "category": "persistence",
      "description": "Selected-chat state does not leak between UI sessions.",
      "initial_state": {"session_A": "chat-A", "session_B": "chat-B"},
      "actions": ["update_session_A"],
      "expected_state": {"session_B": "chat-B"},
      "required_events": ["session_local_state"],
      "forbidden_events": ["cross_session_selection"],
      "deterministic": true,
      "execution_layer": "Chainlit handler/data-layer",
      "repetitions": 1,
      "oracle": "persistence_session_isolation",
      "tags": ["scope_isolation"]
    },
    {
      "id": "PB-PERSIST-005",
      "category": "persistence",
      "description": "User A cannot list, open, or retrieve user B chats.",
      "initial_state": {"users": ["A", "B"]},
      "actions": ["list_as:A", "open_B_as:A"],
      "expected_state": {"foreign_chats": 0},
      "required_events": ["user_scope_filter"],
      "forbidden_events": ["foreign_chat_read"],
      "deterministic": true,
      "execution_layer": "repository/service",
      "repetitions": 1,
      "oracle": "unsupported_user_isolation",
      "tags": ["scope_isolation", "security"]
    },
    {
      "id": "PB-PERSIST-006",
      "category": "persistence",
      "description": "A chat-associated document is unavailable to unrelated chats unless explicitly global.",
      "initial_state": {"document_chat": "A", "query_chat": "B"},
      "actions": ["index_document:A", "retrieve:B"],
      "expected_state": {"foreign_document_chunks": 0},
      "required_events": ["document_scope_filter"],
      "forbidden_events": ["cross_chat_document"],
      "deterministic": true,
      "execution_layer": "repository/service",
      "repetitions": 1,
      "oracle": "unsupported_document_association",
      "tags": ["scope_isolation", "documents"]
    },
    {
      "id": "PB-PERSIST-007",
      "category": "persistence",
      "description": "Evidence provenance references existing chats, messages, documents, and valid ranges.",
      "initial_state": {"chat_messages": 3},
      "actions": ["build_candidate", "validate_provenance"],
      "expected_state": {"dangling_references": 0},
      "required_events": ["provenance_validation"],
      "forbidden_events": ["dangling_message_id", "invalid_range"],
      "deterministic": true,
      "execution_layer": "repository/service",
      "repetitions": 1,
      "oracle": "persistence_provenance_integrity",
      "tags": ["scope_isolation", "no_collateral_damage"]
    }
  ]
