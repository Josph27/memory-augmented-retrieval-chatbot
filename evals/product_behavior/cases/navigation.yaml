{
  "cases": [
    {
      "id": "PB-NAV-001",
      "category": "navigation",
      "description": "Opening Home is message-free and invokes no model.",
      "initial_state": {"view": "chat"},
      "actions": ["open_home"],
      "expected_state": {"view": "home", "persisted_message_delta": 0, "model_calls": 0},
      "required_events": ["product-state:home"],
      "forbidden_events": ["assistant_message", "answer_model_call"],
      "deterministic": true,
      "execution_layer": "browser E2E",
      "repetitions": 1,
      "oracle": "browser_not_executed",
      "tags": ["no_collateral_damage"]
    },
    {
      "id": "PB-NAV-002",
      "category": "navigation",
      "description": "All persisted active chats appear in sidebar navigation.",
      "initial_state": {"active_chats": 3},
      "actions": ["list_threads"],
      "expected_state": {"visible_active_chats": 3},
      "required_events": ["thread_list_read"],
      "forbidden_events": ["model_call", "message_write"],
      "deterministic": true,
      "execution_layer": "Chainlit handler/data-layer",
      "repetitions": 1,
      "oracle": "navigation_all_active",
      "tags": ["persistence", "no_collateral_damage"]
    },
    {
      "id": "PB-NAV-003",
      "category": "navigation",
      "description": "Ended chats remain visible and selectable.",
