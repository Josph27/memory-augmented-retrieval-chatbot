      "initial_state": {"same_timestamp_chats": 5},
      "actions": ["list_page_1", "list_page_2"],
      "expected_state": {"duplicates": 0, "missing": 0, "stable": true},
      "required_events": ["ordered_thread_query"],
      "forbidden_events": ["duplicate_thread"],
      "deterministic": true,
      "execution_layer": "repository/service",
      "repetitions": 1,
      "oracle": "navigation_stable_order",
      "tags": ["persistence"]
    },
    {
      "id": "PB-NAV-005",
      "category": "navigation",
      "description": "Opening chat A renders only chat A history.",
      "initial_state": {"chats": ["A", "B"], "messages_per_chat": 2},
      "actions": ["load_thread:A"],
      "expected_state": {"visible_chat": "A", "foreign_messages": 0},
      "required_events": ["thread_read:A"],
      "forbidden_events": ["message_from:B"],
