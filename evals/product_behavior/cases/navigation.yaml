    {
      "id": "PB-NAV-006",
      "category": "navigation",
      "description": "Home and chat switching call no model, router, retriever, or memory extractor.",
      "initial_state": {"persisted_chat": "A"},
      "actions": ["load_thread:A"],
      "expected_state": {"model_calls": 0, "message_delta": 0},
      "required_events": ["repository_read"],
      "forbidden_events": ["model_call", "router_call", "retriever_call", "memory_update"],
