{
  "cases": [
    {
      "id": "PB-LIFE-001",
      "category": "lifecycle",
      "description": "New Chat creates and opens a real active persisted chat.",
      "initial_state": {"view": "home"},
      "actions": ["new_chat"],
      "expected_state": {"persisted_chat_delta": 1, "active": true, "selected": true},
      "required_events": ["ChatService.start_chat", "thread_resume"],
      "forbidden_events": ["answer_model_call"],
      "deterministic": true,
      "execution_layer": "browser E2E",
      "repetitions": 1,
      "oracle": "browser_not_executed",
      "tags": ["lifecycle", "persistence"]
    },
    {
      "id": "PB-LIFE-002",
      "category": "lifecycle",
      "description": "An empty newly persisted chat is visible before its first message.",
      "initial_state": {"chat_messages": 0},
      "actions": ["create_chat", "list_threads"],
      "expected_state": {"thread_visible": true},
      "required_events": ["chat_insert", "thread_list_read"],
      "forbidden_events": ["message_write"],
      "deterministic": true,
      "execution_layer": "Chainlit handler/data-layer",
      "repetitions": 1,
      "oracle": "lifecycle_empty_chat_visible",
      "tags": ["persistence"]
    },
    {
      "id": "PB-LIFE-003",
      "category": "lifecycle",
      "description": "End Chat delegates to the authoritative ChatEndAction.",
      "initial_state": {"active_chat": true},
      "actions": ["end_chat"],
      "expected_state": {"ChatEndAction_calls": 1},
      "required_events": ["ChatEndAction.execute"],
      "forbidden_events": ["ui_memory_flush_implementation"],
      "deterministic": true,
      "execution_layer": "Chainlit handler/data-layer",
      "repetitions": 1,
      "oracle": "lifecycle_authoritative_end",
      "tags": ["lifecycle"]
    },
    {
      "id": "PB-LIFE-004",
      "category": "lifecycle",
      "description": "Successful End Chat finalizes work, marks inactive, and preserves history.",
      "initial_state": {"active_chat": true, "messages": 2},
      "actions": ["ChatEndAction.execute"],
      "expected_state": {"active": false, "messages": 2, "flush_calls": 1},
      "required_events": ["memory_flush", "gist_finalize", "mark_inactive"],
      "forbidden_events": ["message_delete"],
      "deterministic": true,
      "execution_layer": "repository/service",
      "repetitions": 1,
      "oracle": "lifecycle_end_transition",
      "tags": ["lifecycle", "no_collateral_damage"]
    },
    {
      "id": "PB-LIFE-005",
      "category": "lifecycle",
      "description": "End Chat does not print chat lists or Home content into the transcript.",
      "initial_state": {"active_chat": true},
      "actions": ["end_chat"],
      "expected_state": {"navigation_messages": 0},
      "required_events": ["sidebar_refresh"],
      "forbidden_events": ["chat_list_message", "home_assistant_message"],
      "deterministic": true,
      "execution_layer": "browser E2E",
      "repetitions": 1,
      "oracle": "browser_not_executed",
      "tags": ["no_collateral_damage"]
    },
    {
      "id": "PB-LIFE-006",
      "category": "lifecycle",
      "description": "Ended chat history remains readable.",
      "initial_state": {"ended_chat": true, "messages": 2},
      "actions": ["open_ended_chat"],
      "expected_state": {"visible_messages": 2, "read_only": true},
      "required_events": ["thread_resume"],
      "forbidden_events": ["message_write"],
      "deterministic": true,
      "execution_layer": "browser E2E",
      "repetitions": 1,
      "oracle": "browser_not_executed",
      "tags": ["persistence"]
    },
    {
      "id": "PB-LIFE-007",
      "category": "lifecycle",
      "description": "Ended chats reject new turns before persistence and model execution.",
      "initial_state": {"ended_chat": true},
      "actions": ["send_message"],
      "expected_state": {"message_delta": 0, "model_calls": 0},
      "required_events": ["inactive_guard"],
      "forbidden_events": ["message_write", "answer_model_call"],
      "deterministic": true,
      "execution_layer": "Chainlit handler/data-layer",
      "repetitions": 1,
      "oracle": "lifecycle_inactive_guard",
      "tags": ["lifecycle", "no_collateral_damage"]
    },
    {
      "id": "PB-LIFE-008",
      "category": "lifecycle",
      "description": "Repeated End Chat is idempotent.",
      "initial_state": {"active_chat": true, "messages": 2},
      "actions": ["end_chat", "end_chat"],
      "expected_state": {"active": false, "duplicate_gists": 0, "duplicate_messages": 0},
      "required_events": ["single_effective_finalization"],
      "forbidden_events": ["duplicate_memory", "duplicate_gist"],
      "deterministic": true,
      "execution_layer": "repository/service",
      "repetitions": 1,
      "oracle": "lifecycle_end_idempotent",
      "tags": ["idempotency", "lifecycle"]
    },
    {
      "id": "PB-LIFE-009",
      "category": "lifecycle",
      "description": "Fork delegates to ChatForkAction and opens a persisted fork.",
      "initial_state": {"chat": "original"},
      "actions": ["fork_chat"],
      "expected_state": {"fork_delta": 1, "selected": "fork"},
      "required_events": ["ChatForkAction.execute", "thread_resume"],
      "forbidden_events": ["ui_copy_sql"],
      "deterministic": true,
      "execution_layer": "browser E2E",
      "repetitions": 1,
      "oracle": "browser_not_executed",
      "tags": ["lifecycle"]
    },
    {
      "id": "PB-LIFE-010",
      "category": "lifecycle",
      "description": "Fork copies initial history and subsequent messages remain independent.",
      "initial_state": {"original_messages": 2},
      "actions": ["fork_chat", "write_original", "write_fork"],
      "expected_state": {"shared_prefix": 2, "independent_suffixes": true},
      "required_events": ["transactional_fork"],
      "forbidden_events": ["cross_chat_suffix"],
      "deterministic": true,
      "execution_layer": "repository/service",
      "repetitions": 1,
      "oracle": "lifecycle_fork_independence",
      "tags": ["scope_isolation", "lifecycle"]
    }
  ]
}
