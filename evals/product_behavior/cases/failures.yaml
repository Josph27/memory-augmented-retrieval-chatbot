{
  "cases": [
    {
      "id": "PB-FAIL-001",
      "category": "failures",
      "description": "Indexing failure produces Failed status and a truthful UI error.",
      "initial_state": {"document_status": "Uploading"},
      "actions": ["index_failure"],
      "expected_state": {"document_status": "Failed", "answer_calls": 0},
      "required_events": ["truthful_index_error"],
      "forbidden_events": ["Ready", "answer_from_failed_document"],
      "deterministic": true,
      "execution_layer": "Chainlit handler/data-layer",
      "repetitions": 1,
      "oracle": "document_index_failure_truthfulness",
      "tags": ["documents", "no_collateral_damage"]
    },
    {
      "id": "PB-FAIL-002",
